<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    TripSplit Register Page
    File: register.html

    Architecture Decision:
    User creation is handled through Firebase Authentication.
    Additional user profile data is stored in Firestore under users/{uid}.
  -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Register | TripSplit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
  <div id="toast-root" class="toast-root"></div>

  <header class="site-header">
    <nav class="navbar container">
      <a href="./index.html" class="brand">
        <span class="brand-mark">TS</span>
        <span class="brand-text">TripSplit</span>
      </a>

      <div class="nav-actions">
        <a href="./login.html" class="btn btn-dark">Login</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="form-card">
      <div class="form-header">
        <p class="eyebrow">Start splitting</p>
        <h1 style="font-size: 2.4rem;">Create Account</h1>
        <p>Create your TripSplit account and manage group expenses.</p>
      </div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input
            id="fullName"
            name="fullName"
            type="text"
            class="form-control"
            autocomplete="name"
            minlength="2"
            required
          />
          <small class="form-error" data-error-for="fullName"></small>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            id="email"
            name="email"
            type="email"
            class="form-control"
            autocomplete="email"
            required
          />
          <small class="form-error" data-error-for="email"></small>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            class="form-control"
            autocomplete="new-password"
            minlength="6"
            required
          />
          <small class="form-error" data-error-for="password"></small>
        </div>

        <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">
          Create Account
        </button>
      </form>

      <div class="form-footer">
        <p>
          Already have an account?
          <a href="./login.html">Login</a>
        </p>
      </div>
    </section>
  </main>

  <script type="module" src="./js/firebase.js"></script>
  <script type="module" src="./js/app.js"></script>
  <script type="module" src="./js/auth.js"></script>
</body>
</html>
