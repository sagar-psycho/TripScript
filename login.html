<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    TripSplit Login Page
    File: login.html

    Architecture Decision:
    Login is a public route.
    If the user is already authenticated, auth.js redirects them to dashboard.html.
  -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login | TripSplit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
  <div id="toast-root" class="toast-root"></div>

  <header class="site-header">
    <nav class="navbar container">
      <a href="./index.html" class="brand">
        <span class="brand-mark">TS</span>
        <span class="brand-text">TripSplit</span>
      </a>

      <div class="nav-actions">
        <a href="./register.html" class="btn btn-dark">Register</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="form-card">
      <div class="form-header">
        <p class="eyebrow">Welcome back</p>
        <h1 style="font-size: 2.4rem;">Login</h1>
        <p>Access your trips, expenses, and settlements.</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            id="email"
            name="email"
            type="email"
            class="form-control"
            autocomplete="email"
            required
          />
          <small class="form-error" data-error-for="email"></small>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            class="form-control"
            autocomplete="current-password"
            minlength="6"
            required
          />
          <small class="form-error" data-error-for="password"></small>
        </div>

        <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">
          Login
        </button>
      </form>

      <div class="form-footer">
        <p>
          New to TripSplit?
          <a href="./register.html">Create account</a>
        </p>
      </div>
    </section>
  </main>

  <script type="module" src="./js/firebase.js"></script>
  <script type="module" src="./js/app.js"></script>
  <script type="module" src="./js/auth.js"></script>
</body>
</html>
